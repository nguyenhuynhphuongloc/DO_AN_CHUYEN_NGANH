services:
  auth-service:
    build:
      target: dev
    command: ["sh", "-c", "npx prisma generate && npm run start:dev"]
    volumes:
      - ./microservices/auth-service:/app
      - auth_service_node_modules:/app/node_modules

  finance-service:
    build:
      target: dev
    command: ["sh", "-c", "npx prisma generate && npm run start:dev"]
    volumes:
      - ./microservices/finance-service:/app
      - finance_service_node_modules:/app/node_modules

  receipt-service:
    build:
      target: dev
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8003",
        "--reload"
      ]
    volumes:
      - ./microservices/receipt-service:/app
      - receipt_uploads:/app/uploads

  receipt-worker:
    command: ["python", "-m", "app.worker"]
    volumes:
      - ./microservices/receipt-service:/app
      - receipt_uploads:/app/uploads

  frontend:
    build:
      target: dev
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0", "-p", "3000"]
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./microservices/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next

volumes:
  auth_service_node_modules:
  finance_service_node_modules:
  frontend_node_modules:
  frontend_next_cache:

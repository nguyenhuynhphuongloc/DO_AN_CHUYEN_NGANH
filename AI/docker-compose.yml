name: ai-microservices

x-service-defaults: &service-defaults
  init: true
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-receipt-runtime-env: &receipt-runtime-env
  FINANCE_SERVICE_URL: http://finance-service:8002
  FRONTEND_URL: http://localhost:3000
  RECEIPT_UPLOAD_DIR: uploads
  OCR_DEVICE: ${RECEIPT_OCR_DEVICE:-auto}
  OCR_RECOGNIZER_BACKEND: ${RECEIPT_OCR_RECOGNIZER_BACKEND:-vietocr}
  OCR_FALLBACK_RECOGNIZER_BACKEND: ${RECEIPT_OCR_FALLBACK_RECOGNIZER_BACKEND:-}
  OCR_TEXTLINE_ORIENTATION_ENABLED: ${RECEIPT_OCR_TEXTLINE_ORIENTATION_ENABLED:-true}
  OCR_TEXTLINE_ORIENTATION_MODEL: ${RECEIPT_OCR_TEXTLINE_ORIENTATION_MODEL:-PP-LCNet_x0_25_textline_ori}
  OCR_TEXTLINE_ORIENTATION_SCORE_THRESHOLD: ${RECEIPT_OCR_TEXTLINE_ORIENTATION_SCORE_THRESHOLD:-0.7}

services:
  auth-service:
    <<: *service-defaults
    image: ai-auth-service:local
    build:
      context: ./microservices/auth-service
      target: prod
    env_file:
      - ./microservices/auth-service/.env
    environment:
      PORT: 8001
      FRONTEND_URL: http://localhost:3000
      RUN_DB_PUSH: "false"
      RUN_SEED: "false"
    ports:
      - "8001:8001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  finance-service:
    <<: *service-defaults
    image: ai-finance-service:local
    build:
      context: ./microservices/finance-service
      target: prod
    env_file:
      - ./microservices/finance-service/.env
    environment:
      PORT: 8002
      FRONTEND_URL: http://localhost:3000
      RUN_DB_PUSH: "false"
      RUN_SEED: "false"
    ports:
      - "8002:8002"
    depends_on:
      auth-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  receipt-service:
    <<: *service-defaults
    image: ai-receipt-service:local
    build:
      context: ./microservices/receipt-service
      target: prod
      args:
        PADDLE_INSTALL_COMMAND: ${RECEIPT_PADDLE_INSTALL_COMMAND:-python -m pip install paddlepaddle==3.2.0}
        VIETOCR_INSTALL_COMMAND: ${RECEIPT_VIETOCR_INSTALL_COMMAND:-python -m pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu}
    env_file:
      - ./microservices/receipt-service/.env
    environment:
      <<: *receipt-runtime-env
      PORT: 8003
    ports:
      - "8003:8003"
    volumes:
      - ./models:/models
      - receipt_uploads:/app/uploads
    depends_on:
      finance-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/health')"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  receipt-worker:
    <<: *service-defaults
    image: ai-receipt-service:local
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./microservices/receipt-service/.env
    environment:
      <<: *receipt-runtime-env
      WORKER_POLL_INTERVAL_SECONDS: ${RECEIPT_WORKER_POLL_INTERVAL_SECONDS:-2}
      WORKER_BATCH_SIZE: ${RECEIPT_WORKER_BATCH_SIZE:-1}
    volumes:
      - ./models:/models
      - receipt_uploads:/app/uploads
    depends_on:
      receipt-service:
        condition: service_healthy

  frontend:
    <<: *service-defaults
    image: ai-frontend:local
    build:
      context: ./microservices/frontend
      target: prod
      args:
        NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
        NEXT_PUBLIC_FINANCE_API_URL: http://localhost:8002
        NEXT_PUBLIC_RECEIPT_API_URL: http://localhost:8003
        INTERNAL_AUTH_API_URL: http://auth-service:8001
        INTERNAL_FINANCE_API_URL: http://finance-service:8002
        INTERNAL_RECEIPT_API_URL: http://receipt-service:8003
    env_file:
      - ./microservices/frontend/.env
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8001
      NEXT_PUBLIC_FINANCE_API_URL: http://localhost:8002
      NEXT_PUBLIC_RECEIPT_API_URL: http://localhost:8003
      INTERNAL_AUTH_API_URL: http://auth-service:8001
      INTERNAL_FINANCE_API_URL: http://finance-service:8002
      INTERNAL_RECEIPT_API_URL: http://receipt-service:8003
    ports:
      - "3000:3000"
    depends_on:
      receipt-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  receipt_uploads:

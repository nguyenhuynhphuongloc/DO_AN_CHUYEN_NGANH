services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: do-an-chuyen-nganh-web
    user: "0:0"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AI_SERVICE_URL: http://receipt-ai:8000
    ports:
      - '3000:3000'
    depends_on:
      receipt-ai:
        condition: service_healthy
    volumes:
      - media-data:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  receipt-ai:
    build:
      context: .
      dockerfile: services/receipt-ai/Dockerfile
    container_name: do-an-chuyen-nganh-receipt-ai
    env_file:
      - .env
    ports:
      - '8000:8000'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  media-data:

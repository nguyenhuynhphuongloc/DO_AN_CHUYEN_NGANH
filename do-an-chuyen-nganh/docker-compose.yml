services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: do-an-chuyen-nganh-web
    user: "0:0"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      AI_SERVICE_URL: http://receipt-ai:8000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev
    ports:
      - '3000:3000'
    depends_on:
      receipt-ai:
        condition: service_healthy
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-next-cache:/app/.next
      - media-data:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  web-prod:
    profiles:
      - prod
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: do-an-chuyen-nganh-web-prod
    user: "0:0"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AI_SERVICE_URL: http://receipt-ai:8000
      NEXT_TELEMETRY_DISABLED: "1"
    command: sh -c "npm run build && npm run start"
    ports:
      - '3001:3000'
    depends_on:
      receipt-ai:
        condition: service_healthy
    volumes:
      - .:/app
      - web-node-modules:/app/node_modules
      - web-next-prod-cache:/app/.next
      - media-data:/app/media
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  receipt-ai:
    build:
      context: .
      dockerfile: services/receipt-ai/Dockerfile
    container_name: do-an-chuyen-nganh-receipt-ai
    env_file:
      - .env
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    volumes:
      - ./services/receipt-ai:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  web-node-modules:
  web-next-cache:
  web-next-prod-cache:
  media-data:
